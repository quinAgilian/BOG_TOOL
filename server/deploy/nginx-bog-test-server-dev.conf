# BOG 测试环境 Nginx 模板
# 访问入口（测试）：
#   - 正式地址：https://dev.bog.generalquin.top/
#
# 使用步骤：
#   1. 确保 DNS 中 dev.bog.generalquin.top 指向本机 IP
#   2. 使用 acme.sh 或 certbot 为 dev.bog.generalquin.top 申请证书，并放到：
#        /etc/tengine/ssl/dev.bog.generalquin.top.fullchain.cer
#        /etc/tengine/ssl/dev.bog.generalquin.top.key
#   3. 将本文件复制到 /etc/tengine/conf.d/ 目录，例如：
#        sudo cp deploy/nginx-bog-test-server-dev.conf /etc/tengine/conf.d/bog-dev.conf
#   4. 检查配置并重载：
#        sudo tengine -t && sudo systemctl reload tengine
#
# 注意：
#   - dev 环境后端应用监听 127.0.0.1:8001（见 bog-test-server-dev.service）
#   - 此处直接将整站流量转发到 dev 后端，页面同样会显示备案信息
#############################

# 80 端口：全部请求重定向到 HTTPS
server {
    listen 80;
    server_name dev.bog.generalquin.top;

    return 301 https://$host$request_uri;
}

# 443 端口：HTTPS 终结 + 反向代理到 dev 后端
server {
    listen 443 ssl http2;
    server_name dev.bog.generalquin.top;

    ssl_certificate     /etc/tengine/ssl/dev.bog.generalquin.top.fullchain.cer;
    ssl_certificate_key /etc/tengine/ssl/dev.bog.generalquin.top.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 如需开启 HSTS，可取消注释，确认无调试需求后再用
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://127.0.0.1:8001/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

