# Nginx 反向代理配置 - 测试环境
# 用法：
#   1. server_name 已配置为 dev.bog.generalquin.top
#   2. sudo cp deploy/nginx-bog-test-server-dev.conf /etc/tengine/conf.d/
#   3. sudo nginx -t && sudo systemctl reload tengine
# 测试域名需在 DNS 中添加 A 记录指向服务器 IP

server {
    listen 8081;
    server_name dev.bog.generalquin.top;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
