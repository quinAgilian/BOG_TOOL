# Nginx 反向代理配置 - 生产环境
# 用法：
#   1. server_name 已配置为 bog.generalquin.top
#   2. sudo cp deploy/nginx-bog-test-server.conf /etc/tengine/conf.d/
#   3. sudo tengine -t && sudo systemctl reload tengine
# 域名需在 DNS 中添加 A 记录指向服务器 IP
# 使用 8080 端口避免国内 80 端口 ICP 备案拦截
# 注意：80 端口由 nginx.conf 默认 server（fix-tengine-default.sh）处理，此处仅 8080，避免 server_name _ 冲突

server {
    listen 8080;
    server_name bog.generalquin.top;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
