# BOG 生产环境 Nginx 模板
# 访问入口：
#   - 正式地址：https://generalquin.top/bog
#   - 兼容老地址：http://generalquin.top/bog （301 跳转到 HTTPS）
#
# 使用步骤：
#   1. 确保 DNS 中 generalquin.top 指向本机 IP
#   2. 使用 acme.sh 或 certbot 为 generalquin.top 申请证书，并放到：
#        /etc/tengine/ssl/generalquin.top.fullchain.cer
#        /etc/tengine/ssl/generalquin.top.key
#   3. 将本文件复制到 /etc/tengine/conf.d/ 目录，例如：
#        sudo cp deploy/nginx-bog-test-server.conf /etc/tengine/conf.d/bog.conf
#   4. 检查配置并重载：
#        sudo tengine -t && sudo systemctl reload tengine
#
# 注意：
#   - 后端应用仍然监听 127.0.0.1:8000
#   - Nginx 通过 /bog/ 路径转发到后端根路径 /
#############################

# 80 端口：/bog 和 /bog/ 下的请求全部重定向到 HTTPS
server {
    listen 80;
    server_name generalquin.top;

    # 处理 /bog（无尾斜杠），统一跳到 /bog/
    location = /bog {
        return 301 https://$host/bog/;
    }

    # 处理 /bog/ 以及其子路径
    location /bog/ {
        return 301 https://$host$request_uri;
    }
}

# 443 端口：HTTPS 终结 + 反向代理到后端
server {
    listen 443 ssl http2;
    server_name generalquin.top;

    ssl_certificate     /etc/tengine/ssl/generalquin.top.fullchain.cer;
    ssl_certificate_key /etc/tengine/ssl/generalquin.top.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 如需开启 HSTS，可取消注释，确认无调试需求后再用
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 默认将所有路径转发到后端应用，确保 /home 等内部跳转路径不会 404
    location / {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

