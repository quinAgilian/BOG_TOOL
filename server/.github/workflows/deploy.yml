name: Deploy to Aliyun

on:
  push:
    branches: [main, dev, feature/firmware-admin]

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.set.outputs.deploy }}
      branch: ${{ steps.set.outputs.branch }}
    steps:
      - id: set
        run: |
          echo "deploy=$([ -n '${{ secrets.DEPLOY_HOST }}' ] && echo true || echo false)" >> $GITHUB_OUTPUT
          echo "branch=${GITHUB_REF#refs/heads/}" >> $GITHUB_OUTPUT

  deploy:
    needs: check
    if: needs.check.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > "$GITHUB_WORKSPACE/deploy_key"
          chmod 600 "$GITHUB_WORKSPACE/deploy_key"
      - name: Deploy main (production)
        if: needs.check.outputs.branch == 'main'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: /github/workspace/deploy_key
          script: |
            set -e
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] 部署开始"
            cd /opt/bog-test-server
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在拉取代码..."
            git checkout main && git pull origin main
            source .venv/bin/activate
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在安装依赖（可能需要 1–2 分钟）..."
            pip install -r requirements.txt --quiet
            sudo mkdir -p /var/lib/bog-test-server
            if [ -f /opt/bog-test-server/bog_test.db ] && [ ! -f /var/lib/bog-test-server/bog_test.db ]; then
              sudo cp /opt/bog-test-server/bog_test.db /var/lib/bog-test-server/
            fi
            sudo cp deploy/bog-test-server.service /etc/systemd/system/
            sudo systemctl daemon-reload
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在重启服务..."
            sudo systemctl restart bog-test-server
            sudo cp deploy/nginx-bog-test-server.conf /etc/tengine/conf.d/
            sudo bash deploy/fix-tengine-default.sh 2>/dev/null || true
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在重载 Tengine..."
            sudo tengine -t 2>/dev/null && sudo systemctl reload tengine 2>/dev/null || true
            echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" > /opt/bog-test-server/deploy_timestamp.txt
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 生产环境部署完成"
      - name: Deploy dev (test)
        if: needs.check.outputs.branch == 'dev' || needs.check.outputs.branch == 'feature/firmware-admin'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: /github/workspace/deploy_key
          script: |
            set -e
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] 部署开始"
            DEV_DIR=/opt/bog-test-server-dev
            BRANCH=${{ needs.check.outputs.branch }}
            U=$(whoami)
            if [ ! -d "$DEV_DIR" ]; then
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 首次部署 dev：正在复制生产目录..."
              sudo cp -r /opt/bog-test-server "$DEV_DIR"
              sudo chown -R $U:$U "$DEV_DIR"
              cd "$DEV_DIR"
              rm -rf .venv
              git config --global --add safe.directory "$DEV_DIR"
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在拉取 dev 分支代码..."
              git checkout $BRANCH && git pull origin $BRANCH
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在创建虚拟环境..."
              python3 -m venv .venv
            else
              cd "$DEV_DIR"
              sudo chown -R $U:$U "$DEV_DIR"
              git config --global --add safe.directory "$DEV_DIR"
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在拉取 dev 分支代码..."
              git checkout $BRANCH && git pull origin $BRANCH
            fi
            source "$DEV_DIR/.venv/bin/activate"
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在安装依赖（可能需要 1–2 分钟）..."
            pip install -r requirements.txt --quiet
            sudo mkdir -p /var/lib/bog-test-server-dev
            if [ ! -f /etc/systemd/system/bog-test-server-dev.service ]; then
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 首次创建 dev systemd service..."
              sudo cp "$DEV_DIR/deploy/bog-test-server-dev.service" /etc/systemd/system/
            else
              echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 跳过覆盖已存在的 dev systemd service（保留本地环境变量配置）"
            fi
            sudo systemctl daemon-reload
            sudo systemctl enable bog-test-server-dev
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在重启 dev 服务..."
            sudo systemctl restart bog-test-server-dev 2>/dev/null || sudo systemctl start bog-test-server-dev
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在复制 nginx 配置..."
            sudo cp "$DEV_DIR/deploy/nginx-bog-test-server.conf" /etc/tengine/conf.d/ 2>/dev/null || true
            sudo cp "$DEV_DIR/deploy/nginx-bog-test-server-dev.conf" /etc/tengine/conf.d/ 2>/dev/null || sudo cp "$DEV_DIR/deploy/nginx-bog-test-server-dev.conf" /etc/nginx/conf.d/ 2>/dev/null || true
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在执行 fix-tengine..."
            sudo bash "$DEV_DIR/deploy/fix-tengine-default.sh" 2>/dev/null || true
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> 正在重载 Tengine/Nginx..."
            sudo tengine -t 2>/dev/null && sudo systemctl reload tengine 2>/dev/null || sudo nginx -t 2>/dev/null && sudo systemctl reload nginx 2>/dev/null || true
            echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" | sudo tee "$DEV_DIR/deploy_timestamp.txt" > /dev/null
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] >>> dev 环境部署完成"

